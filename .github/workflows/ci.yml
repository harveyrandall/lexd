name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm compile:examples
      - run: pnpm package:vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-lexd-vsix
          path: packages/vscode-lexd/*.vsix
          if-no-files-found: error
